version: "3.9"

services:
  db:
    image: postgres:16.6-alpine
    container_name: bidmaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidmaster
      POSTGRES_PASSWORD: bidmaster
      POSTGRES_DB: bidmaster
    ports:
      - "5432:5432"
    volumes:
      - pg16-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: bidmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis7-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidmaster-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bidmaster:bidmaster@db:5432/bidmaster
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bidmaster-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pg16-data:
  redis7-data:
  backend-node-modules:
  frontend-node-modules:
